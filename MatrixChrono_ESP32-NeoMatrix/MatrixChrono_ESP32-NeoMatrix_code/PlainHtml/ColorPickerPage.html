<!doctype html>
<html lang="pt">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖌️</text></svg>"
        />
        <title>Seletor de cor</title>
        <script src="iro.min.js"></script>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f3f3f3;
            }
            #container {
                max-width: 800px;
                margin: 50px auto;
                padding: 20px;
                background-color: #fff;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            }
            .color-display-container {
                display: inline-block;
                width: calc(30% - 10px);
                margin-bottom: 20px;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                text-align: center;
            }
            .color-display {
                width: 100px;
                height: 100px;
                border: 1px solid #ccc;
                border-radius: 5px;
                display: inline-block;
            }
            .color-display-title {
                text-align: center;
                margin-top: 5px;
            }
            .rgb-display {
                text-align: center;
                margin-top: 5px;
            }
            .color-button {
                width: 50px;
                height: 50px;
                margin-right: 10px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                outline: #f3f3f3 solid 5px;
            }
            #iro-container {
                margin: 0 auto;
                margin-top: 20px;
                margin-bottom: 20px;
                width: 500px;
            }
            #rgb-display {
                margin-top: 20px;
                margin-bottom: 20px;
            }
            #testNightButton,
            #testBaseButton,
            #saveButton,
            #backButton {
                margin-top: 20px;
                margin-bottom: 20px;
                width: 70px;
                padding: 10px;
                border: none;
                border-radius: 5px;
                background-color: #007bff;
                color: #fff;
                cursor: pointer;
                outline: none;
            }
            #custom-text-field {
                position: relative;
                max-width: 400px;
                text-wrap: balance;
                color: #5c5c5c;
            }
            #title-wrapper {
                display: flex;
                align-items: center;
            }
            #title-wrapper h1 {
                margin: 0;
            }
        </style>
    </head>
    <body>
        <div id="container">
            <div id="title-wrapper">
                <button id="backButton" onclick="window.location.href='/'">&lt;</button>
                <h1>Seletor de cor</h1>
            </div>
            <div>
                <div class="color-display-container">
                    <div class="color-display-title">Base</div>
                    <div id="color-display-base" class="color-display"></div>
                    <div id="rgb-display-base" class="rgb-display"></div>
                    <button id="testBaseButton" onclick="testColor('base')">Testar</button>
                </div>
                <div class="color-display-container">
                    <div class="color-display-title">Night</div>
                    <div id="color-display-night" class="color-display"></div>
                    <div id="rgb-display-night" class="rgb-display"></div>
                    <button id="testNightButton" onclick="testColor('night')">Testar</button>
                </div>
            </div>
            <div>
                <div id="rgb-display"><br /></div>
            </div>
            <div>
                <button class="color-button" style="background-color: #fff" onclick='setColor("#FFFFFF")'>W</button>
                <button class="color-button" style="background-color: red" onclick='setColor("#FF0000")'>R</button>
                <button class="color-button" style="background-color: #0f0" onclick='setColor("#00FF00")'>G</button>
                <button class="color-button" style="background-color: #00f" onclick='setColor("#0000FF")'>B</button>
                <button class="color-button" style="background-color: #ff0" onclick='setColor("#FFFF00")'>Y</button>
                <button class="color-button" style="background-color: #f0f" onclick='setColor("#FF00FF")'>P</button>
                <button class="color-button" style="background-color: #0ff" onclick='setColor("#00FFFF")'>C</button>
            </div>
            <div id="iro-container"></div>
            <button id="saveButton" onclick="SendColor()">Guardar</button>
            <div id="custom-text-field">{{Custom-text}}</div>
        </div>
        <script>
            var maxbrightness = "{{MAX_BRIGHTNESS}}";
            var maxbrightness = "40";
            var colorPicker = new iro.ColorPicker("#iro-container", {
                wheelLightness: false,
                width: 200,
                layout: [{ component: iro.ui.Wheel }, { component: iro.ui.Slider }],
                colors: ["#000000", "#ffffff"],
            });
            colorPicker.on("color:change", function (color, changes) {
                colorPicker.colors.forEach(function (color) {});
                if (colorPicker.colors[0].value > maxbrightness) {
                    colorPicker.colors[0].value = maxbrightness;
                }
                if (colorPicker.colors[1].value > maxbrightness) {
                    colorPicker.colors[1].value = maxbrightness;
                }
                document.getElementById("color-display-base").style.backgroundColor = colorPicker.colors[0].hexString;
                document.getElementById("color-display-night").style.backgroundColor = colorPicker.colors[1].hexString;
                updateRGBDisplay(colorPicker.colors[0].rgb, "base");
                updateRGBDisplay(colorPicker.colors[1].rgb, "night");
            });
            function setColor(color) {
                colorPicker.color.set(color);
            }
            function setCurrentColor(baseColor, nightColor) {
                colorPicker.colors[0].set(baseColor);
                colorPicker.colors[1].set(nightColor);
            }
            function updateRGBDisplay(rgb, type) {
                var rgbDisplay = document.getElementById("rgb-display-" + type);
                rgbDisplay.innerHTML = `RGB: (${rgb.r}, ${rgb.g}, ${rgb.b})`;
            }
            function SendColor() {
                var baseColor = colorPicker.colors[0].hexString;
                var nightColor = colorPicker.colors[1].hexString;
                var data = "Base_color=" + baseColor + "&Night_color=" + nightColor;
                var xhr = new XMLHttpRequest();
                var url = "/SaveColor";
                xhr.open("POST", url, true);
                xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
                xhr.send(data);
                console.log(data);
            }
            function testColor(colorType) {
                var rgbColor = colorType === "base" ? colorPicker.colors[0].hexString : colorPicker.colors[1].hexString;
                var xhr = new XMLHttpRequest();
                var url = "/TestColor";
                xhr.open("POST", url, true);
                xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
                console.log("type=" + colorType + "&color=" + rgbColor);
                xhr.send("type=" + colorType + "&color=" + rgbColor);
            }
            setCurrentColor("{{MAIN_COLOR}}", "{{NIGHT_COLOR}}");
        </script>
    </body>
</html>
